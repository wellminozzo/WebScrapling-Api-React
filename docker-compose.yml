version: "3.9"

services:

  api:
    build: ./api
    ports:
      - "7040:8080"
    depends_on:
      - db

  web:
    build: ./client/react-ts
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./client/react-ts:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true    

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "SuaSenhaForte123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data: